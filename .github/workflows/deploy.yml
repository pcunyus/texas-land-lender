# FSCAP Intelligence Hub - Liveboat Feed Build
# MIT License | FSCAP Intelligence Hub
# Task 4: Liveboat Deployment Verification
# Runs newsboat + liveboat to generate static HTML feed reader
# Deploys output to GitHub Pages from /docs on main branch

name: FSCAP Intelligence Hub - Feed Build

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 */6 * * *' # Runs at 0 minutes past the hour, every 6 hours
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install newsboat and liveboat
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y newsboat
          sudo wget -q -O /usr/local/bin/liveboat https://github.com/exaroth/liveboat/releases/download/stable/liveboat-linux-musl
          sudo chmod +x /usr/local/bin/liveboat
          newsboat --version || true
          liveboat --version || true

      - name: Create newsboat config directories
        run: |
          mkdir -p ~/.newsboat
          cp config/urls ~/.newsboat/urls
          cp config/newsboat-config ~/.newsboat/config

      - name: Fetch RSS feeds
        run: |
          newsboat -x reload -c ~/.newsboat/cache.db -u ~/.newsboat/urls

      - name: Initialize liveboat
        run: |
          mkdir -p $GITHUB_WORKSPACE/docs
          liveboat -x init $GITHUB_WORKSPACE/docs

      - name: Generate liveboat static site
        run: |
          liveboat \
            --cache-file ~/.newsboat/cache.db \
            --url-file ~/.newsboat/urls \
            $GITHUB_WORKSPACE/docs

      - name: Commit and push docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "chore: update liveboat feed [skip ci]"
          git push
