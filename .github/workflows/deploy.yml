# FSCAP Intelligence Hub - Liveboat Feed Build
# MIT License | FSCAP Intelligence Hub
# Task 4: Liveboat Deployment Verification
# Runs newsboat + liveboat to generate static HTML feed reader
# Deploys output to GitHub Pages from /docs on main branch

name: FSCAP Intelligence Hub - Feed Build

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 */6 * * *' # Runs at 0 minutes past the hour, every 6 hours
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install newsboat and liveboat
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y newsboat
          curl -sSL -o /usr/local/bin/liveboat \
            https://github.com/exaroth/liveboat/releases/latest/download/liveboat-linux-gnu
          sudo chmod +x /usr/local/bin/liveboat

      - name: Initialize liveboat templates
        run: |
          liveboat -x init

      - name: Create newsboat config directories
        run: |
          mkdir -p ~/.newsboat
          cp $GITHUB_WORKSPACE/config/newsboat-config ~/.newsboat/config
          cp $GITHUB_WORKSPACE/config/urls ~/.newsboat/urls

      - name: Fetch RSS feeds
        run: |
          newsboat -x reload

      - name: Generate liveboat static site
        run: |
          mkdir -p $GITHUB_WORKSPACE/docs
          liveboat \
            --config-file $GITHUB_WORKSPACE/config/liveboat-config.toml \
            --url-file ~/.newsboat/urls \
            --cache-file ~/.newsboat/cache.db \
            $GITHUB_WORKSPACE/docs

      - name: Commit and push docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cd $GITHUB_WORKSPACE
          git add docs/
          git diff --cached --quiet && exit 0
          git commit -m "Feed rebuild @ $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          git push
