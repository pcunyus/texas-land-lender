# FSCAP Intelligence Hub - Liveboat Feed Build
# MIT License | FSCAP Intelligence Hub
# Task 4: Liveboat Deployment Verification
# Runs newsboat + liveboat to generate static HTML feed reader
# Deploys output to GitHub Pages from /docs on main branch

name: FSCAP Intelligence Hub - Feed Build

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install newsboat and liveboat
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y newsboat
          curl -sSL https://github.com/TheBiggerGuy/liveboat/releases/latest/download/liveboat-x86_64-unknown-linux-gnu.tar.gz \
            | tar xz -C /usr/local/bin/ liveboat
          liveboat --version

      - name: Create newsboat config directories
        run: |
          mkdir -p ~/.newsboat
          cp config/urls ~/.newsboat/urls
          cp config/newsboat-config ~/.newsboat/config

      - name: Fetch RSS feeds
        run: |
          newsboat -x reload
        continue-on-error: true

      - name: Generate liveboat static site
        run: |
          mkdir -p docs
          liveboat \
            --config config/liveboat-config.toml \
            --output docs

      - name: Commit and push docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "chore: liveboat feed build $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
