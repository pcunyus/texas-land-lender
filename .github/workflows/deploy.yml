# FSCAP Intelligence Hub - Liveboat Feed Build
# MIT License | FSCAP Intelligence Hub
# Task 4: Liveboat Deployment Verification

name: FSCAP Intelligence Hub - Feed Build

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install newsboat and liveboat
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y sqlite3 newsboat
          curl -sSL -o /usr/local/bin/liveboat \
            https://github.com/exaroth/liveboat/releases/latest/download/liveboat-linux-gnu
          sudo chmod +x /usr/local/bin/liveboat

      - name: Set up liveboat templates
        # Clone from liveboat-github-runner which has the correct template layout
        # (templates/default/ contains config.toml, index.hbs, include/ directly)
        run: |
          git clone --depth=1 https://github.com/exaroth/liveboat-github-runner.git /tmp/liveboat-runner
          mkdir -p ~/.config/liveboat/templates
          cp -r /tmp/liveboat-runner/templates/default ~/.config/liveboat/templates/
          # Also copy assets directory from the runner repo
          cp -r /tmp/liveboat-runner/assets ~/.config/liveboat/

      - name: Create newsboat config directories
        run: |
          mkdir -p ~/.newsboat
          cp $GITHUB_WORKSPACE/config/newsboat-config ~/.newsboat/config
          cp $GITHUB_WORKSPACE/config/urls ~/.newsboat/urls

      - name: Fetch RSS feeds
        run: |
          newsboat -x reload

      - name: Patch newsboat cache.db for liveboat compatibility
        # Ubuntu 22.04 ships with newsboat 2.21, which lacks the
        # enclosure_description and enclosure_description_mime_type columns
        # that liveboat expects (added in newsboat 2.29+).
        run: |
          sqlite3 ~/.newsboat/cache.db <<EOF
          ALTER TABLE rss_item ADD COLUMN enclosure_description VARCHAR(1024) NOT NULL DEFAULT '';
          ALTER TABLE rss_item ADD COLUMN enclosure_description_mime_type VARCHAR(128) NOT NULL DEFAULT '';
          EOF

      - name: Generate liveboat static site
        run: |
          mkdir -p $GITHUB_WORKSPACE/docs
          liveboat \
            --config-file $GITHUB_WORKSPACE/config/liveboat-config.toml \
            --url-file ~/.newsboat/urls \
            --cache-file ~/.newsboat/cache.db \
            $GITHUB_WORKSPACE/docs

      - name: Commit and push docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cd $GITHUB_WORKSPACE
          git add docs/
          git diff --cached --quiet && exit 0
          git commit -m "Feed rebuild @ $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          git push
